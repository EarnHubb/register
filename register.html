<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Account</title><style>body{margin:0;background:#0c0617;color:#fff;font-family:Arial;padding:24px}.container{max-width:420px;margin:auto}.title{font-size:54px;font-weight:700}.sub{color:#aab;margin:14px 0 30px}label{display:block;margin:18px 0 8px}input{width:100%;padding:18px;border-radius:18px;border:1px solid #2b2340;background:#171222;color:#fff;box-sizing:border-box}.pass{position:relative}.pass span{position:absolute;right:18px;top:18px;cursor:pointer}button{width:100%;margin-top:28px;padding:18px;border:none;border-radius:30px;background:linear-gradient(90deg,#f0d37b,#e146ff);font-size:22px;font-weight:700}</style></head><body><div class="container"><div class="title">Create<br>Account</div><div class="sub">Enter your details to continue.</div><label>Full Name</label><input placeholder="Enter Full Name"><label>Email Address</label><input placeholder="Enter Email Address"><label>Username</label><input placeholder="Choose Username"><label>Phone Number</label><input placeholder="Enter Phone Number"><label>Password</label><div class="pass"><input id="p1" type="password" placeholder="Create Password"><span onclick="tg('p1')">👁️</span></div><label>Confirm Password</label><div class="pass"><input id="p2" type="password" placeholder="Confirm Password"><span onclick="tg('p2')">👁️</span></div><button onclick="location.href='https://yourwete.com'">Create Account</button></div><script>function tg(i){var e=document.getElementById(i);e.type=e.type==='password'?'text':'password';}</script></body></html>
